<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>億り人ジェネレーター</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="description" content="架空の収益報告スクリーンショットを生成するネタサイト。あなたも今日から億り人。">
<meta property="og:title" content="億り人ジェネレーター">
<meta property="og:description" content="あなたも今日から億り人。架空の収益報告を作って遊ぼう。">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f5f3ef;
    color: #1a1a1a;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== HEADER ===== */
  header {
    padding: 48px 20px 32px;
    max-width: 600px;
    margin: 0 auto;
  }

  header h1 {
    font-size: 22px;
    font-weight: 900;
    margin-bottom: 8px;
  }

  header h1 span {
    display: inline-block;
    background: #1a1a1a;
    color: #f5f3ef;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 13px;
    vertical-align: middle;
    margin-left: 6px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  header p {
    font-size: 14px;
    color: #666;
    line-height: 1.7;
  }

  header p strong { color: #1a1a1a; }

  .notice {
    margin-top: 16px;
    font-size: 12px;
    color: #999;
    line-height: 1.6;
    padding-left: 16px;
    border-left: 2px solid #ddd;
  }

  /* ===== MAIN ===== */
  main {
    max-width: 600px;
    margin: 0 auto;
    padding: 0 20px 80px;
  }

  /* ===== CONTROLS ===== */
  .controls {
    margin-bottom: 32px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: #999;
    margin-bottom: 8px;
  }

  .tpl-picker {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
  }

  .tpl-btn {
    flex: 1;
    background: white;
    border: 1.5px solid #e0ddd8;
    border-radius: 8px;
    padding: 12px 8px;
    cursor: pointer;
    text-align: center;
    transition: border-color 0.15s;
    font-family: inherit;
  }

  .tpl-btn:hover { border-color: #aaa; }

  .tpl-btn.on {
    border-color: #1a1a1a;
    background: #1a1a1a;
    color: white;
  }

  .tpl-btn .ico { font-size: 20px; display: block; margin-bottom: 4px; }
  .tpl-btn .nm { font-size: 12px; font-weight: 700; }

  .input-row {
    display: flex;
    gap: 0;
    margin-bottom: 10px;
  }

  .cur-btns {
    display: flex;
    flex-direction: column;
    gap: 0;
    flex-shrink: 0;
  }

  .cur-btn {
    background: white;
    border: 1.5px solid #e0ddd8;
    color: #999;
    width: 44px;
    height: 28px;
    font-family: -apple-system, system-ui, sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .cur-btn:first-child {
    border-radius: 8px 0 0 0;
    border-bottom: none;
  }

  .cur-btn:last-child {
    border-radius: 0 0 0 8px;
  }

  .cur-btn.on {
    background: #1a1a1a;
    border-color: #1a1a1a;
    color: white;
  }

  .amt-input {
    flex: 1;
    background: white;
    border: 1.5px solid #e0ddd8;
    border-left: none;
    border-radius: 0 8px 8px 0;
    padding: 12px 16px;
    font-family: -apple-system, system-ui, sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: #1a1a1a;
    outline: none;
    min-width: 0;
  }

  .amt-input:focus { border-color: #1a1a1a; }

  .amt-input::placeholder {
    color: #ccc;
    font-size: 15px;
    font-weight: 400;
  }

  .quick {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }

  .q-btn {
    background: white;
    border: 1px solid #e0ddd8;
    border-radius: 6px;
    padding: 4px 12px;
    font-family: inherit;
    font-size: 12px;
    color: #666;
    cursor: pointer;
  }

  .q-btn:hover { border-color: #1a1a1a; color: #1a1a1a; }

  .gen-btn {
    width: 100%;
    background: #1a1a1a;
    border: none;
    border-radius: 8px;
    padding: 14px;
    color: white;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }

  .gen-btn:hover { background: #333; }

  /* ===== PREVIEW ===== */
  .preview { display: none; }
  .preview.vis { display: block; }

  .pv-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .pv-bar span { font-size: 13px; color: #999; font-weight: 500; }

  .pv-actions { display: flex; gap: 6px; }

  .pv-btn {
    background: white;
    border: 1px solid #e0ddd8;
    border-radius: 6px;
    padding: 8px 16px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    color: #1a1a1a;
    cursor: pointer;
  }

  .pv-btn:hover { border-color: #1a1a1a; }

  .pv-btn.xpost {
    background: #1a1a1a;
    border-color: #1a1a1a;
    color: white;
  }

  .pv-btn.xpost:hover { background: #333; }

  .ss-wrap {
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    margin-bottom: 20px;
  }

  /* ====== TPL 1: X Creator Revenue (mobile app style) ====== */
  .tpl-x {
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    position: relative;
    padding: 0;
    color: #e7e9ea;
    width: 100%;
    aspect-ratio: 9/14;
    max-height: 520px;
    display: flex;
    flex-direction: column;
  }

  .tpl-x .x-nav {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    gap: 16px;
    border-bottom: 0.5px solid #2f3336;
  }

  .tpl-x .x-nav .x-close {
    font-size: 20px;
    color: #e7e9ea;
    font-weight: 300;
  }

  .tpl-x .x-nav .x-navtitle {
    font-size: 16px;
    font-weight: 700;
    color: #e7e9ea;
  }

  .tpl-x .x-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 24px 20px;
  }


  .tpl-x .x-handle {
    font-size: 14px;
    color: #71767b;
    margin-bottom: 28px;
  }

  .tpl-x .x-entries {
    width: 100%;
    text-align: left;
  }

  .tpl-x .x-entry {
    padding: 16px 0;
    border-top: 0.5px solid #2f3336;
  }

  .tpl-x .x-entry-amt {
    font-size: 22px;
    font-weight: 400;
    color: #e7e9ea;
    margin-bottom: 4px;
    font-variant-numeric: tabular-nums;
  }

  .tpl-x .x-entry-period {
    font-size: 14px;
    color: #71767b;
  }

  /* ====== TPL 2: Bank App (Japanese banking app style) ====== */
  .tpl-bank {
    background: #f7f6f3;
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    position: relative;
    width: 100%;
    aspect-ratio: 9/14;
    max-height: 520px;
    display: flex;
    flex-direction: column;
    color: #333;
  }

  .tpl-bank .bk-header {
    background: #1b6b3a;
    padding: 16px 16px 14px;
    color: white;
    text-align: center;
  }

  .tpl-bank .bk-header-date {
    font-size: 14px;
    font-weight: 500;
    opacity: 0.85;
  }


  .tpl-bank .bk-card {
    background: white;
    margin: 8px 16px;
    border-radius: 10px;
    padding: 18px 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }

  .tpl-bank .bk-card-type {
    font-size: 15px;
    font-weight: 700;
    color: #333;
    margin-bottom: 2px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .tpl-bank .bk-card-branch {
    font-size: 12px;
    color: #999;
    margin-bottom: 10px;
  }

  .tpl-bank .bk-card-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }

  .tpl-bank .bk-amount {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', system-ui, sans-serif;
    font-size: 34px;
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: -0.5px;
    font-variant-numeric: tabular-nums;
  }

  .tpl-bank .bk-amount-yen {
    font-size: 18px;
    font-weight: 500;
    color: #666;
    margin-left: 2px;
  }

  .tpl-bank .bk-hide-btn {
    font-size: 12px;
    color: #666;
    background: #f0efec;
    border-radius: 6px;
    padding: 5px 14px;
    font-weight: 500;
  }

  /* ====== TPL 3: Stripe Dashboard ====== */
  .tpl-stripe {
    background: white;
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    position: relative;
    padding: 28px 24px;
    min-height: 360px;
    color: #1a1a1a;
  }

  .tpl-stripe .st-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .tpl-stripe .st-brand {
    font-size: 18px;
    font-weight: 700;
    color: #635bff;
    letter-spacing: -0.3px;
  }

  .tpl-stripe .st-live {
    font-size: 12px;
    color: #635bff;
    background: #f0eeff;
    padding: 3px 10px;
    border-radius: 12px;
    font-weight: 600;
  }

  .tpl-stripe .st-tabs {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
    border-bottom: 1px solid #e6e6e6;
    padding-bottom: 10px;
  }

  .tpl-stripe .st-tab {
    font-size: 14px;
    color: #999;
    font-weight: 500;
  }

  .tpl-stripe .st-tab.active {
    color: #1a1a1a;
    font-weight: 700;
    position: relative;
  }

  .tpl-stripe .st-tab.active::after {
    content: '';
    position: absolute;
    bottom: -11px;
    left: 0; right: 0;
    height: 2px;
    background: #635bff;
  }

  .tpl-stripe .st-period {
    font-size: 13px;
    color: #999;
    margin-bottom: 4px;
  }

  .tpl-stripe .st-amount {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', system-ui, sans-serif;
    font-size: 42px;
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: -1px;
    font-variant-numeric: tabular-nums;
    margin-bottom: 4px;
  }

  .tpl-stripe .st-change {
    font-size: 13px;
    color: #30b566;
    font-weight: 600;
    margin-bottom: 20px;
  }

  .tpl-stripe .st-chart {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    height: 56px;
    margin-bottom: 20px;
  }

  .tpl-stripe .st-bar {
    flex: 1;
    background: #e8e5ff;
    border-radius: 2px 2px 0 0;
    min-height: 4px;
  }

  .tpl-stripe .st-bar.hi {
    background: #635bff;
  }

  .tpl-stripe .st-foot {
    display: flex;
    gap: 24px;
    padding-top: 14px;
    border-top: 1px solid #f0f0f0;
  }

  .tpl-stripe .st-fitem { font-size: 12px; color: #999; }

  .tpl-stripe .st-fval {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', system-ui, sans-serif;
    font-weight: 600;
    color: #1a1a1a;
    font-size: 15px;
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
  }

  /* ===== WATERMARKS ===== */
  .wm {
    position: absolute;
    bottom: 10px;
    right: 14px;
    font-size: 10px;
    color: rgba(255,255,255,0.18);
    font-weight: 600;
    pointer-events: none;
    font-family: -apple-system, system-ui, sans-serif;
  }

  .tpl-bank .wm, .tpl-stripe .wm {
    color: rgba(0,0,0,0.07);
  }

  .wm-diag {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-28deg);
    font-size: 18px;
    font-weight: 900;
    color: rgba(255,255,255,0.035);
    letter-spacing: 3px;
    white-space: nowrap;
    pointer-events: none;
    font-family: -apple-system, system-ui, sans-serif;
  }

  .tpl-bank .wm-diag, .tpl-stripe .wm-diag {
    color: rgba(0,0,0,0.025);
  }

  /* ===== TWEET TEMPLATES ===== */
  .tweets {
    margin-bottom: 20px;
  }

  .tweets h3 {
    font-size: 13px;
    color: #999;
    font-weight: 500;
    margin-bottom: 8px;
  }

  .tw {
    background: white;
    border: 1px solid #e0ddd8;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 13px;
    line-height: 1.6;
    color: #333;
    cursor: pointer;
    margin-bottom: 6px;
    position: relative;
    transition: border-color 0.15s;
  }

  .tw:hover { border-color: #aaa; }

  .tw .cp {
    position: absolute;
    top: 8px;
    right: 10px;
    font-size: 11px;
    color: #ccc;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .tw:hover .cp { opacity: 1; }
  .tw .cp.ok { opacity: 1; color: #30b566; }

  .tw.sel {
    border-color: #1a1a1a;
    background: #f9f8f6;
  }

  .tw-actions {
    display: flex;
    gap: 6px;
    margin-top: 10px;
  }

  .tw-act {
    flex: 1;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #e0ddd8;
    background: white;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: #1a1a1a;
    text-align: center;
  }

  .tw-act:hover { border-color: #1a1a1a; }

  .tw-act.xact {
    background: #1a1a1a;
    border-color: #1a1a1a;
    color: white;
  }

  .tw-act.xact:hover { background: #333; }

  .tw-act:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  /* ===== FOOTER ===== */
  footer {
    max-width: 600px;
    margin: 0 auto;
    padding: 24px 20px 48px;
    font-size: 12px;
    color: #bbb;
    line-height: 1.7;
    border-top: 1px solid #e0ddd8;
  }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1a1a1a;
    color: white;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    z-index: 100;
    transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: none;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 500px) {
    .tpl-picker { flex-direction: column; }
    .amt-input { font-size: 22px; }
    .tpl-x .x-entry-amt { font-size: 18px; }
    .tpl-bank .bk-amount { font-size: 28px; }
    .tpl-stripe .st-amount { font-size: 32px; }
  }
</style>
</head>
<body>

<header>
  <h1>億り人ジェネレーター <span>PARODY</span></h1>
  <p>架空の<strong>収益報告スクショ</strong>を作れるネタサイトです。<br>あなたも今日から億り人。</p>
  <div class="notice">生成画像はフィクションです。透かし入り。詐欺・虚偽広告目的の使用禁止。</div>
</header>

<main>
  <div class="controls">
    <label>テンプレート</label>
    <div class="tpl-picker">
      <button class="tpl-btn on" data-t="x" onclick="pickTpl('x')">
        <span class="ico">&#x1D54F;</span>
        <span class="nm">X 収益</span>
      </button>
      <button class="tpl-btn" data-t="bank" onclick="pickTpl('bank')">
        <span class="ico">&#x1F3E6;</span>
        <span class="nm">銀行口座</span>
      </button>
      <button class="tpl-btn" data-t="stripe" onclick="pickTpl('stripe')">
        <span class="ico">&#x1F4B3;</span>
        <span class="nm">決済ダッシュボード</span>
      </button>
    </div>

    <label>金額</label>
    <div class="input-row">
      <div class="cur-btns">
        <button class="cur-btn on" data-c="JPY" onclick="pickCur('JPY')">&#xA5;</button>
        <button class="cur-btn" data-c="USD" onclick="pickCur('USD')">$</button>
      </div>
      <input type="text" class="amt-input" id="amtIn" placeholder="金額を入力" inputmode="numeric">
    </div>

    <div class="quick">
      <button class="q-btn" onclick="setAmt(500000)">50万</button>
      <button class="q-btn" onclick="setAmt(1234567)">123万</button>
      <button class="q-btn" onclick="setAmt(5000000)">500万</button>
      <button class="q-btn" onclick="setAmt(12800000)">1,280万</button>
      <button class="q-btn" onclick="setAmt(100000000)">1億</button>
      <button class="q-btn" onclick="setAmt(999999999)">9.9億</button>
      <button class="q-btn" onclick="setAmt(84300000000)">843億</button>
    </div>

    <button class="gen-btn" onclick="gen()">生成する</button>
  </div>

  <div class="preview" id="pv">
    <div class="pv-bar">
      <span>プレビュー</span>
      <div class="pv-actions">
        <button class="pv-btn" onclick="dl()">画像を保存</button>
      </div>
    </div>
    <div class="ss-wrap" id="ssArea"></div>

    <div class="tweets">
      <h3>投稿テンプレを選んでポスト</h3>
      <div id="twArea"></div>
      <div class="tw-actions">
        <button class="tw-act" id="cpBtn" onclick="cpSel()" disabled>テキストをコピー</button>
        <button class="tw-act xact" id="xBtn" onclick="postX()" disabled>&#x1D54F; ポストする</button>
      </div>
    </div>
  </div>
</main>

<footer>
  このサイトはネタです。生成画像はすべてフィクションであり、実在の収益とは一切関係ありません。
</footer>

<div class="toast" id="toast"></div>

<script>
const S = { tpl: 'x', cur: 'JPY', amt: 0, selTw: -1 };

function pickTpl(t) {
  S.tpl = t;
  document.querySelectorAll('.tpl-btn').forEach(b => b.classList.toggle('on', b.dataset.t === t));
  if (S.amt > 0) gen();
}

function pickCur(c) {
  S.cur = c;
  document.querySelectorAll('.cur-btn').forEach(b => b.classList.toggle('on', b.dataset.c === c));
  if (S.amt > 0) gen();
}

function setAmt(n) {
  S.amt = n;
  document.getElementById('amtIn').value = n.toLocaleString();
  gen();
}

function parseAmt() {
  return parseInt(document.getElementById('amtIn').value.replace(/\D/g, ''), 10) || 0;
}

function fmt(n, c) {
  if (c === 'USD') return '$' + n.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
  return n.toLocaleString();
}

function fmtYen(n) { return n.toLocaleString(); }

function fmtShort(n) {
  if (n >= 1e8) return (n/1e8).toFixed(1) + '億';
  if (n >= 1e4) return Math.floor(n/1e4) + '万';
  return n.toLocaleString();
}

function rand(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }

function monthStr() {
  const d = new Date(), m = d.getMonth() || 12, y = m === 12 ? d.getFullYear()-1 : d.getFullYear();
  return `${y}年${m}月`;
}

function dateRange(idx) {
  const d = new Date();
  const y = d.getFullYear();
  const m = d.getMonth(); // 0-indexed, current month
  // go back idx periods of 14 days
  const end = new Date(y, m, 1);
  end.setDate(end.getDate() - idx * 14);
  const start = new Date(end);
  start.setDate(start.getDate() - 14);
  const f = d => `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
  return `お支払い期間: ${f(start)}〜${f(end)}`;
}

function nowStr() {
  const d = new Date();
  return `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()} ${d.getHours() < 12 ? '午前' : '午後'} ${d.getHours() > 12 ? d.getHours()-12 : d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function gen() {
  S.amt = parseAmt();
  if (S.amt <= 0) { toast('金額を入力してください'); return; }

  const area = document.getElementById('ssArea');
  const pv = document.getElementById('pv');
  pv.classList.add('vis');
  const a = S.amt, c = S.cur;

  if (S.tpl === 'x') {
    // Generate 2-4 payment entries that look realistic
    const entries = [];
    const mainAmt = c === 'USD' ? fmt(a, c) : '+$' + (a / 150).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
    // If JPY, convert to USD-like display (X pays in USD)
    const usdAmt = c === 'USD' ? a : a / 150;
    const e1 = '+$' + usdAmt.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
    const e2 = '+$' + (usdAmt * (rand(60, 95) / 100)).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
    const e3 = '+$' + (usdAmt * (rand(30, 70) / 100)).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});

    area.innerHTML = `
      <div class="tpl-x" id="cap">
        <div class="wm-diag">FAKE / これはフィクションです / PARODY</div>
        <div class="x-nav">
          <span class="x-close">&times;</span>
          <span class="x-navtitle">クリエイター収益ダッシュボード / X</span>
        </div>
        <div class="x-body">
          <div class="x-handle">@your_handle</div>
          <div class="x-entries">
            <div class="x-entry">
              <div class="x-entry-amt">${e1}</div>
              <div class="x-entry-period">${dateRange(0)}</div>
            </div>
            <div class="x-entry">
              <div class="x-entry-amt">${e2}</div>
              <div class="x-entry-period">${dateRange(1)}</div>
            </div>
            <div class="x-entry">
              <div class="x-entry-amt">${e3}</div>
              <div class="x-entry-period">${dateRange(2)}</div>
            </div>
          </div>
        </div>
        <div class="wm">FAKE - 億り人ジェネレーター</div>
      </div>`;
  } else if (S.tpl === 'bank') {
    const amtNum = c === 'USD' ? Math.floor(a * 150) : a;
    const branches = ['さくら','みどり','はなみず','あおぞら','こもれび','ひだまり','かぜのね','つきみ'];
    const branch = branches[rand(0, branches.length - 1)];
    const branchNum = rand(100, 999);
    const acctNum = rand(1000000, 9999999);
    area.innerHTML = `
      <div class="tpl-bank" id="cap">
        <div class="wm-diag">FAKE / これはフィクションです / PARODY</div>
        <div class="bk-header">
          <div class="bk-header-date">${nowStr()} ></div>
        </div>
        <div class="bk-card">
          <div class="bk-card-type">残高別普通 <span style="font-size:18px;color:#ccc;">></span></div>
          <div class="bk-card-branch">${branch}　支店 ${branchNum}${acctNum}</div>
          <div class="bk-card-row">
            <div>
              <span class="bk-amount">${fmtYen(amtNum)}</span>
              <span class="bk-amount-yen">円</span>
            </div>
            <div class="bk-hide-btn">非表示</div>
          </div>
        </div>
        <div class="wm">FAKE - 億り人ジェネレーター</div>
      </div>`;
  } else if (S.tpl === 'stripe') {
    const formatted = c === 'USD' ? '$' + a.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}) : '¥' + a.toLocaleString();
    const change = '+' + rand(12, 280) + '.' + rand(0,9) + '%';
    const txn = rand(80, 8000).toLocaleString();
    const cust = rand(30, 3000).toLocaleString();
    const avg = c === 'USD' ? '$' + Math.floor(a / rand(50,400)).toLocaleString() : '¥' + Math.floor(a / rand(50,400)).toLocaleString();
    const bars = Array.from({length:14}, (_,i) => {
      const h = i === 13 ? 100 : rand(10, 80);
      return `<div class="st-bar${i===13?' hi':''}" style="height:${h}%"></div>`;
    }).join('');
    area.innerHTML = `
      <div class="tpl-stripe" id="cap">
        <div class="wm-diag">FAKE / これはフィクションです / PARODY</div>
        <div class="st-nav">
          <div class="st-brand">stripe</div>
          <div class="st-live">Live</div>
        </div>
        <div class="st-tabs">
          <span class="st-tab active">概要</span>
          <span class="st-tab">支払い</span>
          <span class="st-tab">顧客</span>
          <span class="st-tab">商品</span>
        </div>
        <div class="st-period">${monthStr()}</div>
        <div class="st-amount">${formatted}</div>
        <div class="st-change">${change} vs 先月</div>
        <div class="st-chart">${bars}</div>
        <div class="st-foot">
          <div class="st-fitem">取引数<div class="st-fval">${txn}</div></div>
          <div class="st-fitem">顧客数<div class="st-fval">${cust}</div></div>
          <div class="st-fitem">平均単価<div class="st-fval">${avg}</div></div>
        </div>
        <div class="wm">FAKE - 億り人ジェネレーター</div>
      </div>`;
  }

  mkTweets();
  pv.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function mkTweets() {
  const a = S.amt, c = S.cur;
  const f = c === 'USD' ? '$' + a.toLocaleString() : '¥' + a.toLocaleString();
  const s = fmtShort(a);
  const m = monthStr();

  const ts = [
    `${m}の収益報告です。\n\n${f}\n\n正直、もう会社辞めてもいい気がしてます。\n\n#収益報告 #副業 #億り人ジェネレーター`,
    `副業3ヶ月目。\n月収${s}を達成しました。\n\nやったことはプロフに書いてます。\n（何も書いてない）\n\n#副業で稼ぐ #億り人ジェネレーター`,
    `え、まだ会社で消耗してるの？\n\n僕は先月${s}稼ぎました。\n方法？ DMください。\n（DMしても何も来ません）\n\n#脱サラ #億り人ジェネレーター`,
    `【${m}実績】\n売上：${f}\n労働時間：1日30分\n場所：タイのプール付きヴィラ\n\n嘘です。布団の中です。\n\n#億り人ジェネレーター`,
    `月収${s}達成したので有料note出します。\n\n内容：「このスクショの作り方」\n価格：49,800円\n\n※このスクショはフィクションです\n\n#ネタ #億り人ジェネレーター`,
  ];
  window._tw = ts;

  S.selTw = -1;
  document.getElementById('twArea').innerHTML = ts.map((t,i) =>
    `<div class="tw" data-i="${i}" onclick="selTw(${i})">${t.replace(/\n/g,'<br>')}</div>`
  ).join('');
  updTwBtns();
}

function selTw(i) {
  S.selTw = i;
  document.querySelectorAll('.tw').forEach(el => el.classList.toggle('sel', +el.dataset.i === i));
  updTwBtns();
}

function updTwBtns() {
  const on = S.selTw >= 0;
  document.getElementById('cpBtn').disabled = !on;
  document.getElementById('xBtn').disabled = !on;
}

function cpSel() {
  if (S.selTw < 0 || !window._tw) return;
  navigator.clipboard.writeText(window._tw[S.selTw]).then(() => {
    toast('コピーしました');
  });
}

async function dl() {
  const t = document.getElementById('cap');
  if (!t) return;
  try {
    const c = await html2canvas(t, { backgroundColor: null, scale: 2, useCORS: true });
    const l = document.createElement('a');
    l.download = '億り人ジェネレーター.png';
    l.href = c.toDataURL('image/png');
    l.click();
    toast('保存しました');
  } catch(e) { toast('保存に失敗'); }
}

function postX() {
  if (S.selTw < 0 || !window._tw) return;
  const t = window._tw[S.selTw];
  window.open(`https://x.com/intent/tweet?text=${encodeURIComponent(t + '\n\n' + location.href)}`, '_blank');
}

function toast(m) {
  const t = document.getElementById('toast');
  t.textContent = m;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

document.getElementById('amtIn').addEventListener('input', function() {
  const v = this.value.replace(/\D/g, '');
  if (v) this.value = parseInt(v, 10).toLocaleString();
});
document.getElementById('amtIn').addEventListener('keydown', e => { if (e.key === 'Enter') gen(); });
</script>
